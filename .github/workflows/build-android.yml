name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install app dependencies
        run: |
          cd app
          npm install

      - name: Expo prebuild
        run: |
          cd app
          npx expo prebuild --clean --platform android

      - name: Fix Kotlin version
        run: |
          cd app
          sed -i 's/kotlinCompilerExtensionVersion = versionsMap\[kotlinVersion()\]/kotlinCompilerExtensionVersion = "1.5.14"/' node_modules/expo-modules-core/android/build.gradle
          grep "kotlinCompilerExtensionVersion" node_modules/expo-modules-core/android/build.gradle || true

      - name: Enable cleartext traffic for ws:// connections
        run: |
          cd app/android
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' app/src/main/AndroidManifest.xml
          grep "usesCleartextTraffic" app/src/main/AndroidManifest.xml || true

      - name: Build release APK
        run: |
          cd app/android
          ./gradlew assembleRelease \
            -Pkotlin.compiler.suppressKotlinVersionCompatibilityCheck=true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: remote-pi-apk
          path: app/android/app/build/outputs/apk/release/app-release.apk
